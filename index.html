<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>חופשה באתונה — 14–20 יולי 2026</title>
<style>
  :root{
    --blue:#1565c0;
    --blue-light:#e8f2fd;
    --blue-mid:#1e88e5;
    --sea:#0d47a1;
    --bg:#f7f9fc;
    --card:#ffffff;
    --text:#1a2433;
    --muted:#5b6b7f;
    --border:#e1e7ef;
    --amber:#f5a623;
    --green:#2e7d32;
    --red:#c62828;
    --radius:16px;
    --shadow:0 4px 18px rgba(20,40,80,.09);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI","Arial Hebrew","Noto Sans Hebrew",Arial,sans-serif;
    direction:rtl;
    line-height:1.55;
    padding-bottom:60px;
  }
  header.site{
    background:linear-gradient(135deg,var(--sea),var(--blue-mid));
    color:#fff;
    padding:26px 18px 20px;
    text-align:center;
    box-shadow:var(--shadow);
  }
  header.site h1{margin:0 0 6px;font-size:1.6rem;}
  header.site p{margin:2px 0;opacity:.92;font-size:.95rem;}
  nav.tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    padding:14px 10px;
    max-width:1100px;
    margin:0 auto;
  }
  nav.tabs button{
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    padding:9px 16px;
    border-radius:999px;
    cursor:pointer;
    font-size:.92rem;
    font-weight:600;
    transition:.15s;
  }
  nav.tabs button.locked::after{content:" 🔒";}
  nav.tabs button:hover{border-color:var(--blue-mid);}
  nav.tabs button.active{
    background:var(--blue-mid);
    color:#fff;
    border-color:var(--blue-mid);
  }
  main{max-width:1100px;margin:0 auto;padding:6px 16px 40px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  h2.section-title{font-size:1.25rem;margin:18px 0 12px;color:var(--sea);}
  .sub-note{color:var(--muted);font-size:.88rem;margin:-4px 0 14px;}

  /* day cards */
  .day-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
    gap:18px;
    margin-top:10px;
  }
  .day-card{
    position:relative;
    border-radius:var(--radius);
    overflow:hidden;
    height:230px;
    cursor:pointer;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
    background:#ccc;
    transition:transform .15s;
  }
  .day-card:hover{transform:translateY(-3px);}
  .day-card:focus-visible{outline:3px solid var(--blue-mid);}
  .day-card img{
    position:absolute;inset:0;
    width:100%;height:100%;object-fit:cover;
  }
  .day-card .overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.15) 40%,rgba(0,20,40,.82) 100%);
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:14px;color:#fff;
  }
  .day-card .day-num{
    position:absolute;top:12px;right:12px;
    background:rgba(255,255,255,.92);
    color:var(--sea);
    font-weight:800;
    font-size:.8rem;
    padding:4px 10px;
    border-radius:999px;
  }
  .day-card .date{font-size:.82rem;opacity:.9;margin-bottom:2px;}
  .day-card .title{font-size:1.05rem;font-weight:700;margin-bottom:8px;}
  .day-card .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .day-card .tags span{
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.4);
    font-size:.72rem;
    padding:3px 9px;
    border-radius:999px;
    backdrop-filter:blur(2px);
  }

  /* modal */
  .modal-backdrop{
    display:none;
    position:fixed;inset:0;
    background:rgba(10,20,35,.55);
    z-index:100;
    align-items:flex-start;
    justify-content:center;
    padding:24px 12px;
    overflow-y:auto;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:#fff;
    border-radius:var(--radius);
    max-width:640px;
    width:100%;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    margin-top:20px;
  }
  .modal-hero{height:160px;position:relative;}
  .modal-hero img{width:100%;height:100%;object-fit:cover;}
  .modal-hero .close-btn{
    position:absolute;top:10px;left:10px;
    background:rgba(255,255,255,.9);
    border:none;
    width:34px;height:34px;
    border-radius:50%;
    font-size:1.1rem;
    cursor:pointer;
  }
  .modal-hero .modal-heading{
    position:absolute;bottom:0;right:0;left:0;
    background:linear-gradient(0deg,rgba(0,10,25,.85),transparent);
    color:#fff;padding:14px;
  }
  .modal-body{padding:16px 18px 22px;}
  .timeline-item{
    display:flex;gap:12px;
    padding:10px 0;
    border-bottom:1px dashed var(--border);
  }
  .timeline-item:last-child{border-bottom:none;}
  .timeline-item .time{
    flex:0 0 auto;
    font-weight:700;
    color:var(--blue);
    font-size:.88rem;
    white-space:nowrap;
    min-width:78px;
  }
  .timeline-item .desc{flex:1;font-size:.94rem;}
  .timeline-item .links{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;}
  .link-btn{
    display:inline-flex;align-items:center;gap:4px;
    font-size:.78rem;
    padding:5px 10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
    border:1px solid var(--border);
  }
  .link-btn.maps{background:var(--blue-light);color:var(--blue);}
  .link-btn.waze{background:#e6f7ee;color:var(--green);}
  .link-btn.site{background:#fff4e2;color:#a15c00;}
  .note-box{
    background:var(--blue-light);
    border-radius:10px;
    padding:10px 12px;
    font-size:.86rem;
    margin:12px 0;
    color:#0d3f70;
  }

  /* generic cards for restaurants/links */
  .info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .info-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 16px;
    box-shadow:var(--shadow);
  }
  .info-card h3{margin:0 0 8px;font-size:1rem;color:var(--sea);}
  .item-row{
    display:flex;justify-content:space-between;align-items:flex-start;
    gap:8px;padding:7px 0;border-bottom:1px solid var(--border);
    font-size:.88rem;
  }
  .item-row:last-child{border-bottom:none;}
  .item-row .name{font-weight:600;}
  .item-row .meta{color:var(--muted);font-size:.8rem;}
  .item-row .btns{display:flex;gap:6px;flex-shrink:0;}
  .mini-btn{
    border:1px solid var(--border);
    background:#fff;
    border-radius:7px;
    padding:4px 8px;
    font-size:.75rem;
    text-decoration:none;
    color:var(--blue);
  }

  /* lock screen */
  .lock-box{
    max-width:380px;margin:40px auto;text-align:center;
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:28px 24px;box-shadow:var(--shadow);
  }
  .lock-box .icon{font-size:2.2rem;margin-bottom:6px;}
  .lock-box input{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);
    font-size:1.1rem;text-align:center;letter-spacing:4px;margin:14px 0 10px;
  }
  .lock-box button{
    background:var(--blue-mid);color:#fff;border:none;padding:10px 22px;
    border-radius:10px;font-weight:700;cursor:pointer;font-size:.95rem;
  }
  .lock-error{color:var(--red);font-size:.85rem;min-height:18px;}

  /* checklist */
  .checklist-group{margin-bottom:22px;}
  .check-item{
    display:flex;align-items:center;gap:10px;
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:10px 12px;margin-bottom:8px;
    flex-wrap:wrap;
  }
  .check-item input[type=checkbox]{width:19px;height:19px;flex-shrink:0;}
  .check-item .label{flex:1;min-width:180px;font-size:.92rem;}
  .check-item.done .label{text-decoration:line-through;color:var(--muted);}
  .status-select{
    border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:.8rem;background:#fff;
  }
  .status-select[data-status="שולם"]{background:#e6f7ee;color:var(--green);}
  .status-select[data-status="ממתין"]{background:#fff4e2;color:#a15c00;}
  .status-select[data-status="לביצוע"]{background:#fdeaea;color:var(--red);}

  table.cost-table{width:100%;border-collapse:collapse;font-size:.9rem;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  table.cost-table th,table.cost-table td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);}
  table.cost-table th{background:var(--blue-light);color:var(--sea);}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.72rem;font-weight:700;}
  .badge.paid{background:#e6f7ee;color:var(--green);}
  .badge.pending{background:#fff4e2;color:#a15c00;}

  .warn-box{
    background:#fff4e2;border:1px solid #f3d29a;color:#7a4a00;
    border-radius:10px;padding:12px 14px;font-size:.88rem;margin:10px 0;
  }
  .kv-list{list-style:none;padding:0;margin:0;font-size:.92rem;}
  .kv-list li{padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .kv-list li b{color:var(--sea);}

  footer.site{text-align:center;color:var(--muted);font-size:.82rem;padding:26px 10px 6px;}

  @media (max-width:480px){
    header.site h1{font-size:1.3rem;}
    .day-card{height:200px;}
  }
</style>
</head>

<script>
/* ---------------- נתונים (מתוך מסמך התוכנית המקורי) ---------------- */

function mapsUrl(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}
function wazeUrl(q){return "https://waze.com/ul?q="+encodeURIComponent(q)+"&navigate=yes";}

function linkButtons(placeQuery, extra){
  var html = '<div class="links">';
  html += '<a class="link-btn maps" target="_blank" rel="noopener" href="'+mapsUrl(placeQuery)+'">📍 Google Maps</a>';
  html += '<a class="link-btn waze" target="_blank" rel="noopener" href="'+wazeUrl(placeQuery)+'">🚗 Waze</a>';
  if(extra){
    extra.forEach(function(e){
      html += '<a class="link-btn site" target="_blank" rel="noopener" href="'+e.url+'">🔗 '+e.label+'</a>';
    });
  }
  html += '</div>';
  return html;
}

/* עטיפה בטוחה ל-sessionStorage/localStorage — בדפדפנים/הגדרות מסוימות (למשל פתיחה כקובץ מקומי) עצם הגישה לאובייקט האחסון עלולה לזרוק שגיאה. עטיפה זו מונעת קריסה של כל האתר במקרה כזה. */
var safeStorage = {
  get:function(kind, key){
    try{ return (kind === "session" ? window.sessionStorage : window.localStorage).getItem(key); }catch(e){ return null; }
  },
  set:function(kind, key, val){
    try{ (kind === "session" ? window.sessionStorage : window.localStorage).setItem(key, val); }catch(e){ /* אחסון חסום — מתעלמים בשקט */ }
  }
};

var unlocked = safeStorage.get("session", "athens_unlocked") === "1";

function el(html){
  var d = document.createElement("div");
  d.innerHTML = html.trim();
  return d.firstChild;
}

function renderTabsNav(){
  var nav = document.getElementById("tabsNav");
  nav.innerHTML = "";
  TABS.forEach(function(t){
    var btn = document.createElement("button");
    btn.textContent = t.label;
    btn.className = t.locked ? "locked" : "";
    btn.dataset.tab = t.id;
    btn.addEventListener("click", function(){ showTab(t.id); });
    nav.appendChild(btn);
  });
}

function showTab(id){
  TABS.forEach ? null : null;
  var buttons = document.querySelectorAll("#tabsNav button");
  buttons.forEach(function(b){ b.classList.toggle("active", b.dataset.tab === id); });
  var main = document.getElementById("mainContent");
  main.innerHTML = "";
  var tabDef = TABS.filter(function(t){return t.id===id;})[0];
  if(tabDef.locked && !unlocked){
    main.appendChild(renderLockScreen(id));
    return;
  }
  var renderers = {
    itinerary: renderItinerary,
    restaurants: renderRestaurants,
    parking: renderParking,
    emergency: renderEmergency,
    links: renderLinks,
    logistics: renderLogistics,
    costs: renderCosts,
    checklist: renderChecklist
  };
  main.appendChild(renderers[id]());
  safeStorage.set("local", "athens_last_tab", id);
}

function renderLockScreen(targetId){
  var wrap = el('<div class="lock-box"><div class="icon">🔒</div><h2 style="margin:6px 0;">אזור מוגן בסיסמה</h2><p style="color:var(--muted);font-size:.88rem;">הזינו את הסיסמה כדי לצפות בפרטים האישיים והרגישים</p><input type="password" inputmode="numeric" maxlength="10" placeholder="••••••" id="pwInput"><br><button id="pwSubmit">כניסה</button><div class="lock-error" id="pwError"></div></div>');
  wrap.querySelector("#pwSubmit").addEventListener("click", function(){ tryUnlock(targetId, wrap); });
  wrap.querySelector("#pwInput").addEventListener("keydown", function(e){ if(e.key==="Enter") tryUnlock(targetId, wrap); });
  return wrap;
}
function tryUnlock(targetId, wrap){
  var val = wrap.querySelector("#pwInput").value;
  if(val === PASSWORD){
    unlocked = true;
    safeStorage.set("session", "athens_unlocked", "1");
    showTab(targetId);
  }else{
    wrap.querySelector("#pwError").textContent = "סיסמה שגויה, נסו שוב";
  }
}

function renderItinerary(){
  var wrap = document.createElement("div");
  wrap.appendChild(el('<h2 class="section-title">📅 לוז יומי מלא</h2>'));
  wrap.appendChild(el('<p class="sub-note">לחצו על כל כרטיס יום כדי לראות את כל הפרטים, השעות והקישורים לניווט.</p>'));
  var grid = el('<div class="day-grid"></div>');
  DAYS.forEach(function(day){
    var tagsHtml = day.tags.map(function(t){return "<span>"+t+"</span>";}).join("");
    var card = el(
      '<div class="day-card" tabindex="0" role="button" aria-label="פתח פרטי יום '+day.num+'">'+
        '<img src="'+day.img+'" alt="'+day.title+'" loading="lazy">'+
        '<div class="day-num">יום '+day.num+'</div>'+
        '<div class="overlay">'+
          '<div class="date">'+day.date+'</div>'+
          '<div class="title">'+day.title+'</div>'+
          '<div class="tags">'+tagsHtml+'</div>'+
        '</div>'+
      '</div>'
    );
    card.addEventListener("click", function(){ openDayModal(day); });
    card.addEventListener("keydown", function(e){ if(e.key==="Enter" || e.key===" "){ e.preventDefault(); openDayModal(day); } });
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

function openDayModal(day){
  var modal = document.getElementById("dayModal");
  var itemsHtml = day.items.map(function(it){
    var linksHtml = it.place ? linkButtons(it.place, it.extra) : "";
    return '<div class="timeline-item"><div class="time">'+it.time+'</div><div class="desc">'+it.text+linksHtml+'</div></div>';
  }).join("");
  var ticketHtml = day.ticketNote ? '<div class="note-box">'+day.ticketNote+'</div>' : "";
  var extraNoteHtml = day.note ? '<div class="note-box">'+day.note+'</div>' : "";
  modal.innerHTML =
    '<div class="modal-hero">'+
      '<img src="'+day.img+'" alt="'+day.title+'">'+
      '<button class="close-btn" id="closeModalBtn" aria-label="סגור">✕</button>'+
      '<div class="modal-heading"><div style="font-size:.85rem;opacity:.9;">יום '+day.num+' · '+day.date+'</div><div style="font-size:1.15rem;font-weight:700;">'+day.title+'</div></div>'+
    '</div>'+
    '<div class="modal-body">'+ticketHtml+itemsHtml+extraNoteHtml+
      '<p style="color:var(--muted);font-size:.72rem;margin-top:14px;">📷 '+(day.imgCredit||"")+'</p>'+
    '</div>';
  document.getElementById("dayModalBackdrop").classList.add("open");
  document.getElementById("closeModalBtn").addEventListener("click", closeDayModal);
}
function closeDayModal(){
  document.getElementById("dayModalBackdrop").classList.remove("open");
}
document.getElementById("dayModalBackdrop").addEventListener("click", function(e){
  if(e.target === this) closeDayModal();
});
document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeDayModal();
});

function loadChecklistState(){
  try{ return JSON.parse(safeStorage.get("local", "athens_checklist") || "{}"); }catch(e){ return {}; }
}
function saveChecklistState(state){
  safeStorage.set("local", "athens_checklist", JSON.stringify(state));
}

function renderChecklist(){
  var wrap = document.createElement("div");
  wrap.appendChild(el('<h2 class="section-title">✅ צ׳קליסט</h2>'));
  wrap.appendChild(el('<p class="sub-note">הסימונים והסטטוסים נשמרים אוטומטית בדפדפן הזה (localStorage).</p>'));

  var state = loadChecklistState();
  var group = el('<div class="checklist-group"></div>');

  CHECKLIST_ITEMS.forEach(function(item){
    var itemState = state[item.id] || {done:false, status:"לביצוע"};
    var row = el(
      '<div class="check-item'+(itemState.done?' done':'')+'" data-id="'+item.id+'">'+
        '<input type="checkbox" '+(itemState.done?'checked':'')+'>'+
        '<div class="label">'+item.label+'</div>'+
        '<select class="status-select" data-status="'+itemState.status+'">'+
          '<option value="לביצוע"'+(itemState.status==="לביצוע"?" selected":"")+'>לביצוע</option>'+
          '<option value="ממתין"'+(itemState.status==="ממתין"?" selected":"")+'>ממתין</option>'+
          '<option value="שולם"'+(itemState.status==="שולם"?" selected":"")+'>שולם</option>'+
        '</select>'+
      '</div>'
    );
    var checkbox = row.querySelector("input[type=checkbox]");
    var select = row.querySelector("select");
    checkbox.addEventListener("change", function(){
      row.classList.toggle("done", checkbox.checked);
      var s = loadChecklistState();
      s[item.id] = {done:checkbox.checked, status:select.value};
      saveChecklistState(s);
    });
    select.addEventListener("change", function(){
      select.dataset.status = select.value;
      var s = loadChecklistState();
      s[item.id] = {done:checkbox.checked, status:select.value};
      saveChecklistState(s);
    });
    group.appendChild(row);
  });

  wrap.appendChild(group);
  return wrap;
}
